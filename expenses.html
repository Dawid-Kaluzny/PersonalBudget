<!DOCTYPE html>
<html lang="pl">

	<head>
	
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Budżet domowy</title>
		<meta name="description" content="">
		<meta name="keywords" content="budżet, domowy, finanse, wydatki, oszczędzanie, zarobki, bogactwo">
		<meta name="author" content="Dawid Kałużny">
		
		<meta http-equiv="X-Ua-Compatible" content="IE=edge">
		
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
		<link rel="stylesheet" href="main.css" />
		<link rel="stylesheet" href="css/fontello.css" />
		
		<link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@400;600&display=swap" rel="stylesheet">

		<script src="time.js"></script>
    
	</head>

	<body>

		<header class="sticky">
		
			<nav class="navbar navbar-expand-xl pl-5">
			
				<a class="navbar-brand" href="budzet-menu-glowne"><i class="icon-money"></i> Budżet domowy</a>
				
				<button class="navbar-toggler navbar-dark" type="button" data-toggle="collapse" data-target="#main-menu" aria-controls="main-menu" aria-label="Przełącznik nawigacji">
					<span class="navbar-toggler-icon"></span>
				</button>
				
				<div class="collapse navbar-collapse" id="main-menu">
				
					<ol class="navbar-nav">
						<li class="nav-item">
							<a class="nav-link" href="#"><i class="icon-money-1"></i> Dodaj przychód</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="budzet-wprowadz-wydatek"><i class="icon-shopping-basket"></i> Dodaj wydatek</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="budzet-przegladaj-bilans"><i class="icon-balance-scale"></i> Przeglądaj bilans</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="#"><i class="icon-cog"></i> Ustawienia</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="budzet-domowy"><i class="icon-logout"></i> Wyloguj się</a>
						</li>
					</ol>
					
				</div>
				
			</nav>
			
		</header>
		
		<main>
		
			<div class="container">
			
				<article>
			
					<div class="finance row p-4 container-main">
					
						<div class="col-lg-6 px-3 mx-auto">
					
							<h1 class="header-title"><i class="icon-shopping-basket"></i> Dodaj wydatek</h1>
							
							<form>
							
								<label class="input-right mr-auto">Kwota <input type="number" step="0.01" required></label>
								
								<label class="input-right mb-5 mr-auto">Data <input type="date" id="time"></label>
								
								<p>Sposób płatności:</p>
								<div><label><input type="radio" name="payment" checked> gotówka</label></div>
								<div><label><input type="radio" name="payment"> karta debetowa</label></div>
								<div><label><input type="radio" name="payment"> karta kredytowa</label></div>
								
								<p>Kategoria:</p>
								<div><label><input type="radio" name="expense-category" checked> jedzenie</label></div>
								<div><label><input type="radio" name="expense-category"> mieszkanie</label></div>
								<div><label><input type="radio" name="expense-category"> transport</label></div>
								<div><label><input type="radio" name="expense-category"> telekomunikacja</label></div>
								<div><label><input type="radio" name="expense-category"> opieka zdrowotna</label></div>
								<div><label><input type="radio" name="expense-category"> ubranie</label></div>
								<div><label><input type="radio" name="expense-category"> higiena</label></div>
								<div><label><input type="radio" name="expense-category"> dzieci</label></div>
								<div><label><input type="radio" name="expense-category"> rozrywka</label></div>
								<div><label><input type="radio" name="expense-category"> wycieczka</label></div>
								<div><label><input type="radio" name="expense-category"> szkolenia</label></div>
								<div><label><input type="radio" name="expense-category"> książki</label></div>
								<div><label><input type="radio" name="expense-category"> oszczędności</label></div>
								<div><label><input type="radio" name="expense-category"> emerytura</label></div>
								<div><label><input type="radio" name="expense-category"> spłata długów</label></div>
								<div><label><input type="radio" name="expense-category"> darowizna</label></div>
								<div><label><input type="radio" name="expense-category"> inne wydatki</label></div>
								
								<div><p><label for="comment">Komentarz:</label></p></div>
								<textarea name="comment" id="comment" rows="6" cols="30" maxlength="160"></textarea>
								
								<input type="submit" value="Dodaj">
								<input type="reset" value="Anuluj">
							
							</form>
										
						</div>
					
					</div>
					
				</article>
				
			</div>
		
		</main>
		
		<footer>
			
			<h3 class="h5 p-2 mb-0">Copyright &copy; 2020 Dawid Kałużny (dawid.kaluzny.programista@gmail.com)</h3>
			
		</footer>
		
		<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
		<script src="date.js"></script>

	</body>
	
</html>
