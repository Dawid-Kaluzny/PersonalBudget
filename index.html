<!DOCTYPE html>
<html lang="pl">

	<head>
	
		<meta charset="utf-8">
		<title>Budżet domowy</title>
		<meta name="description" content="">
		<meta name="keywords" content="budżet, domowy, finanse, wydatki, oszczędzanie, zarobki, bogactwo">
		<meta name="author" content="Dawid Kałużny">
		
		<meta http-equiv="X-Ua-Compatible" content="IE=edge">
		<link rel="stylesheet" href="main.css" />
		<link rel="stylesheet" href="login.css" />
		<link rel="stylesheet" href="css/fontello.css" />
		
		<link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@400;600&display=swap" rel="stylesheet">
    
	</head>

	<body>

		<div class="container-login">
		
			<header>
				
				<div class="logo-main-left">
				
					<h2><i class="icon-money"></i><br />Budżet domowy</h2>
					
					<p>Aplikacja wspierająca efektywne zarządzanie finansami w gospodarstwie domowym. Zapanuj nad wydatkami, oszczędzaj pieniądze, inwestuj mądrze i&nbsp;spełniaj swoje marzenia!</p>
					
				</div>
				
			</header>
				
			<div class="login-main-right">
			
				<article>
				
					<div class="login-main">
					
						<h1><i class="icon-money"></i>Logowanie</h1>
						
						<form>
				
							<label><input type="email" placeholder="adres e-mail" required></label>
							
							<label><input type="password" placeholder="hasło" required></label>
							
							<input type="submit" value="Zaloguj się">
				
						</form>
			
					</div>
					
				</article>
			
				<article>
				
					<div class="register-main">
					
						<h3>Nie masz konta?</h3>
						
						<a href="zaloz-konto">Zarejestruj się</a>
				
					</div>
				
				</article>
			
			</div>
			
			<div style="clear: both"></div>
		
		</div>

	</body>
	
</html>
